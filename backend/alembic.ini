[alembic]
# Diretório dos scripts de migração (relativo ao diretório onde alembic é executado)
script_location = alembic

# URL do banco de dados — pode ser sobrescrita via env.py lendo de .env
sqlalchemy.url = sqlite:///./contatos.db

# Formato do nome dos arquivos de versão
file_template = %%(rev)s_%%(slug)s

# Nível de log padrão
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
